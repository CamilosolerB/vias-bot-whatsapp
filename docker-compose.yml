# ============================================
# docker-compose.yml - VíasBot Telegram
# ============================================
# Uso: docker-compose up -d
# Logs: docker-compose logs -f
# Detener: docker-compose down

version: '3.8'

services:
  # ============================================
  # Base de Datos MySQL
  # ============================================
  mysql:
    image: mysql:8.0-alpine
    container_name: vias-bot-mysql
    restart: unless-stopped
    
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vias_bot}
      MYSQL_USER: ${MYSQL_USER:-vias_bot_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vias_bot_password}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    
    ports:
      - "3306:3306"
    
    volumes:
      - mysql_data:/var/lib/mysql
      - ./drizzle:/docker-entrypoint-initdb.d:ro
    
    networks:
      - vias-bot-network
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # ============================================
  # Aplicación Node.js
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vias-bot-app
    restart: unless-stopped
    
    environment:
      # Entorno
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      
      # Base de datos
      DATABASE_URL: mysql://${MYSQL_USER:-vias_bot_user}:${MYSQL_PASSWORD:-vias_bot_password}@mysql:3306/${MYSQL_DATABASE:-vias_bot}
      
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      
      # APIs
      TOMTOM_API_KEY: ${TOMTOM_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      
      # Seguridad
      JWT_SECRET: ${JWT_SECRET}
      
      # Manus
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://login.manus.im}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      
      # APIs integradas
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-https://api.manus.im}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-https://api.manus.im}
      
      # Frontend
      VITE_APP_TITLE: ${VITE_APP_TITLE:-VíasBot}
      VITE_APP_LOGO: ${VITE_APP_LOGO}
      
      # Analytics
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID}
    
    ports:
      - "3000:3000"
    
    depends_on:
      mysql:
        condition: service_healthy
    
    networks:
      - vias-bot-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 10s

  # ============================================
  # Nginx (Reverse Proxy) - Opcional
  # ============================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: vias-bot-nginx
  #   restart: unless-stopped
  #   
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   
  #   depends_on:
  #     - app
  #   
  #   networks:
  #     - vias-bot-network

# ============================================
# Volúmenes
# ============================================
volumes:
  mysql_data:
    driver: local

# ============================================
# Redes
# ============================================
networks:
  vias-bot-network:
    driver: bridge

# ============================================
# Notas
# ============================================
# 1. Crear archivo .env con las variables necesarias
# 2. Ejecutar: docker-compose up -d
# 3. Ver logs: docker-compose logs -f app
# 4. Acceder: http://localhost:3000
# 5. Detener: docker-compose down
# 6. Limpiar: docker-compose down -v (elimina volúmenes)
